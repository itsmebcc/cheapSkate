<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    * { box-sizing: border-box; }
    .header { background: #22c55e; color: #fff; padding: 16px 20px; }
    .header h1 { margin: 0; font-size: 18px; font-weight: 700; }
    .header p { margin: 4px 0 0; font-size: 13px; opacity: 0.9; }
    .content { padding: 16px 20px; }
    .balance-section { text-align: center; padding: 16px 0; border-bottom: 1px solid #eee; }
    .balance-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .balance-amount { font-size: 32px; font-weight: 700; color: #16a34a; }
    .balance-unit { font-size: 14px; color: #888; }
    .stats { padding: 12px 0; }
    .stat-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
    .stat-row .label { color: #666; }
    .stat-row .value { font-weight: 600; }
    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; margin-top: 12px; }
    .btn-primary { background: #22c55e; color: #fff; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn:hover { opacity: 0.9; }
    .footer { padding: 10px 20px; border-top: 1px solid #eee; font-size: 11px; color: #aaa; text-align: center; }
    .footer a { color: #22c55e; text-decoration: none; }
    .hidden { display: none; }
    #register-screen { text-align: center; padding: 24px 0; }
    #register-screen h2 { font-size: 16px; margin-bottom: 8px; }
    #register-screen p { font-size: 13px; color: #666; margin-bottom: 16px; }
    #register-screen input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏷️ cheapSkate</h1>
    <p>Cashback & deals — you keep 50%</p>
  </div>

  <div class="content">
    <div id="register-screen">
      <h2>Get your share of the savings</h2>
      <p>Create an account to start earning cashback on every purchase.</p>
      <input type="email" id="email-input" placeholder="Your email address" />
      <button class="btn btn-primary" id="register-btn">Create Account</button>
    </div>

    <div id="dashboard" class="hidden">
      <div class="balance-section">
        <div class="balance-label">Your Cashback Balance</div>
        <div class="balance-amount" id="balance-display">$0.00</div>
        <div class="balance-unit">earned via cheapSkate</div>
      </div>

      <div class="stats">
        <div class="stat-row">
          <span class="label">Conversions</span>
          <span class="value" id="conversion-count">0</span>
        </div>
        <div class="stat-row">
          <span class="label">Offers available</span>
          <span class="value" id="offer-count">0</span>
        </div>
        <div class="stat-row">
          <span class="label">Your split</span>
          <span class="value">50%</span>
        </div>
      </div>

      <button class="btn btn-secondary" id="withdraw-btn">Withdraw Balance</button>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="settings-link">Settings</a> &middot;
    v1.0.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
